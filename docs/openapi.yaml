openapi: 3.1.0
info:
  title: Zoo Keeper Server
  description: Local LLM inference server with an OpenAI-compatible subset REST API.
  version: 0.0.1
  license:
    name: MIT

servers:
  - url: http://127.0.0.1:8080
    description: Local server

security:
  - BearerAuth: []
  - {}

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Optional. Set `api_key` in server config to require this on all
        non-`/healthz` endpoints.

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message, type]
          properties:
            message:
              type: string
            type:
              type: string
            param:
              type: string
              nullable: true
            code:
              type: string
              nullable: true

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          type: string
        tool_call_id:
          type: string

    ToolDefinition:
      type: object
      required: [name, description, parameters]
      properties:
        name:
          type: string
        description:
          type: string
        parameters:
          type: object
          description: JSON Schema object describing the tool parameters.

    CompletionUsage:
      type: object
      properties:
        prompt_tokens:
          type: integer
          format: int64
        completion_tokens:
          type: integer
          format: int64
        total_tokens:
          type: integer
          format: int64

    ToolInvocationRecord:
      type: object
      required: [id, name, status, arguments]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [succeeded, validation_failed, execution_failed]
        arguments:
          description: Parsed tool arguments when valid JSON, otherwise the raw argument string.
          oneOf:
            - type: object
            - type: array
            - type: string
            - type: number
            - type: integer
            - type: boolean
        result:
          description: Parsed tool result when valid JSON, otherwise the raw result string.
          nullable: true
        error:
          type: string
          nullable: true

    ZooMetrics:
      type: object
      properties:
        latency_ms:
          type: integer
          format: int64
        time_to_first_token_ms:
          type: integer
          format: int64
        tokens_per_second:
          type: number

    SessionSummary:
      type: object
      required: [id, object, model, created, last_used, expires_at]
      properties:
        id:
          type: string
        object:
          type: string
          enum: [session]
        model:
          type: string
        created:
          type: integer
          format: int64
        last_used:
          type: integer
          format: int64
        expires_at:
          type: integer
          format: int64

    SessionHealth:
      type: object
      properties:
        enabled:
          type: boolean
        active:
          type: integer
          format: int64
        max_sessions:
          type: integer
          format: int64
        idle_ttl_seconds:
          type: integer
          format: int64

    HealthSnapshot:
      type: object
      required: [status, ready, model, sessions, version]
      properties:
        status:
          type: string
          enum: [ok, starting]
        ready:
          type: boolean
        version:
          type: string
        model:
          type: object
          properties:
            id:
              type: string
        sessions:
          $ref: "#/components/schemas/SessionHealth"

    GenerationOverrides:
      type: object
      properties:
        temperature:
          type: number
        top_p:
          type: number
        top_k:
          type: integer
        repeat_penalty:
          type: number
        repeat_last_n:
          type: integer
        max_tokens:
          type: integer
        seed:
          type: integer
        stop:
          type: array
          items:
            type: string
        record_tool_trace:
          type: boolean

    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        stream:
          type: boolean
          default: false
        session_id:
          type: string
      allOf:
        - $ref: "#/components/schemas/GenerationOverrides"

    ChatCompletionResponse:
      type: object
      required: [id, object, created, model, choices, usage, zoo_metrics, tool_invocations]
      properties:
        id:
          type: string
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
          format: int64
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                $ref: "#/components/schemas/ChatMessage"
              finish_reason:
                type: string
        usage:
          $ref: "#/components/schemas/CompletionUsage"
        zoo_metrics:
          $ref: "#/components/schemas/ZooMetrics"
        tool_invocations:
          type: array
          items:
            $ref: "#/components/schemas/ToolInvocationRecord"

    ExtractionRequest:
      type: object
      required: [model, schema, messages]
      properties:
        model:
          type: string
        schema:
          type: object
          description: JSON Schema for the expected extraction result.
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        stream:
          type: boolean
          default: false
        session_id:
          type: string
      allOf:
        - $ref: "#/components/schemas/GenerationOverrides"

    ExtractionResponse:
      type: object
      required: [id, object, created, model, text, data, usage, zoo_metrics, tool_invocations]
      properties:
        id:
          type: string
        object:
          type: string
          enum: [extraction]
        created:
          type: integer
          format: int64
        model:
          type: string
        text:
          type: string
          description: Raw model output used to produce the structured extraction.
        data:
          description: Parsed extraction result.
        usage:
          $ref: "#/components/schemas/CompletionUsage"
        zoo_metrics:
          $ref: "#/components/schemas/ZooMetrics"
        tool_invocations:
          type: array
          items:
            $ref: "#/components/schemas/ToolInvocationRecord"

    AgentChatRequest:
      type: object
      required: [model, message]
      properties:
        model:
          type: string
        message:
          $ref: "#/components/schemas/ChatMessage"
      allOf:
        - $ref: "#/components/schemas/GenerationOverrides"

    AgentHistoryRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"

    AgentHistoryMessageRequest:
      type: object
      required: [message]
      properties:
        message:
          $ref: "#/components/schemas/ChatMessage"

    AgentHistorySnapshot:
      type: object
      required: [messages, estimated_tokens, context_size, context_exceeded]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        estimated_tokens:
          type: integer
        context_size:
          type: integer
        context_exceeded:
          type: boolean

    SystemPrompt:
      type: object
      required: [system_prompt]
      properties:
        system_prompt:
          type: string

    CancelResponse:
      type: object
      required: [id, cancelled]
      properties:
        id:
          type: string
        cancelled:
          type: boolean

    RuntimeSnapshot:
      type: object
      required:
        [ready, model_id, model_config, agent_config, default_generation, tool_count, tools, sessions]
      properties:
        ready:
          type: boolean
        model_id:
          type: string
        model_config:
          type: object
          properties:
            model_path:
              type: string
            context_size:
              type: integer
            n_gpu_layers:
              type: integer
            use_mmap:
              type: boolean
            use_mlock:
              type: boolean
        agent_config:
          type: object
          properties:
            max_history_messages:
              type: integer
            request_queue_capacity:
              type: integer
            max_tool_iterations:
              type: integer
            max_tool_retries:
              type: integer
        default_generation:
          type: object
          properties:
            max_tokens:
              type: integer
            stop_sequences:
              type: array
              items:
                type: string
            record_tool_trace:
              type: boolean
            sampling:
              type: object
              properties:
                temperature:
                  type: number
                top_p:
                  type: number
                top_k:
                  type: integer
                repeat_penalty:
                  type: number
                repeat_last_n:
                  type: integer
                seed:
                  type: integer
        tool_count:
          type: integer
        tools:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [function]
              function:
                $ref: "#/components/schemas/ToolDefinition"
        sessions:
          $ref: "#/components/schemas/SessionHealth"

    ServerMetrics:
      type: object
      properties:
        requests_total:
          type: integer
          format: int64
        requests_errors:
          type: integer
          format: int64
        requests_cancelled_total:
          type: integer
          format: int64
        requests_queue_rejected_total:
          type: integer
          format: int64
        stream_disconnects_total:
          type: integer
          format: int64
        tool_invocations_total:
          type: integer
          format: int64
        tool_failures_total:
          type: integer
          format: int64
        tool_timeouts_total:
          type: integer
          format: int64
        active_sessions:
          type: integer
          format: int64
        model_id:
          type: string
        uptime_seconds:
          type: integer
          format: int64

paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Server health check
      security: []
      description: Returns 200 when the model is loaded and ready, 503 otherwise.
      responses:
        "200":
          description: Server is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSnapshot"
        "503":
          description: Server is starting or unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSnapshot"

  /v1/models:
    get:
      operationId: listModels
      summary: List available models
      description: Returns the configured `model_id` in OpenAI list format.
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    enum: [list]
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        object:
                          type: string
                          enum: [model]
                        owned_by:
                          type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/tools:
    get:
      operationId: listTools
      summary: List server-owned tools
      responses:
        "200":
          description: Tool catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    enum: [list]
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [function]
                        function:
                          $ref: "#/components/schemas/ToolDefinition"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/sessions:
    post:
      operationId: createSession
      summary: Create a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model]
              properties:
                model:
                  type: string
                system_prompt:
                  type: string
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionSummary"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Sessions disabled or at capacity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/sessions/{session-id}:
    parameters:
      - name: session-id
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: getSession
      summary: Get session metadata
      responses:
        "200":
          description: Session found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      operationId: deleteSession
      summary: Delete a session
      responses:
        "204":
          description: Session deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/chat/completions:
    post:
      operationId: createChatCompletion
      summary: Create a chat completion
      description: >
        OpenAI-compatible subset. Supports `stream: true` for SSE streaming.
        Unknown fields return 400 with `error.code = "unknown_field"`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: Completion result (non-streaming) or SSE stream (streaming)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
            text/event-stream:
              schema:
                type: string
                description: >
                  SSE stream. Each event is `data: <json>`. Final event is `data: [DONE]`.
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Session is busy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/extractions:
    post:
      operationId: createExtraction
      summary: Create a structured extraction
      description: >
        Supports stateless extraction and session-backed extraction. When `stream: true`,
        SSE sends `{"delta":"..."}` events, then the final extraction payload, then `[DONE]`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionRequest"
      responses:
        "200":
          description: Extraction result (non-streaming) or SSE stream (streaming)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionResponse"
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Session is busy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agent/chat:
    post:
      operationId: createAgentChat
      summary: Chat against the retained shared-agent history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentChatRequest"
      responses:
        "200":
          description: Chat completion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/requests/{request-id}/cancel:
    post:
      operationId: cancelRequest
      summary: Cancel an in-flight request by public request id
      parameters:
        - name: request-id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Cancellation accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Unknown request id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agent/history:
    get:
      operationId: getAgentHistory
      summary: Get the retained shared-agent history
      responses:
        "200":
          description: History snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentHistorySnapshot"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      operationId: replaceAgentHistory
      summary: Replace the retained shared-agent history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentHistoryRequest"
      responses:
        "200":
          description: Updated history snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentHistorySnapshot"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      operationId: clearAgentHistory
      summary: Clear the retained shared-agent history
      responses:
        "204":
          description: History cleared
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agent/history:swap:
    post:
      operationId: swapAgentHistory
      summary: Swap the retained shared-agent history and return the previous snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentHistoryRequest"
      responses:
        "200":
          description: Previous history snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentHistorySnapshot"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agent/history/messages:
    post:
      operationId: appendAgentHistoryMessage
      summary: Append a single message to the retained shared-agent history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentHistoryMessageRequest"
      responses:
        "200":
          description: Updated history snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentHistorySnapshot"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agent/system-prompt:
    get:
      operationId: getAgentSystemPrompt
      summary: Get the effective shared-agent system prompt
      responses:
        "200":
          description: Current system prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemPrompt"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      operationId: updateAgentSystemPrompt
      summary: Update the effective shared-agent system prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemPrompt"
      responses:
        "200":
          description: Updated system prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemPrompt"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/runtime:
    get:
      operationId: getRuntime
      summary: Get server runtime and configuration snapshot
      responses:
        "200":
          description: Runtime snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSnapshot"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /metrics:
    get:
      operationId: getMetrics
      summary: Server metrics snapshot
      responses:
        "200":
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerMetrics"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
