name: build_and_test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  baseline:
    name: baseline (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libjsoncpp-dev uuid-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install jsoncpp

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu) --verbose

      - name: Test
        run: ctest --test-dir build --output-on-failure
