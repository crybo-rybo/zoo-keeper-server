name: build_and_test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  baseline:
    name: baseline (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libjsoncpp-dev uuid-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install jsoncpp

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu) --verbose

      - name: Test
        run: ctest --test-dir build --output-on-failure

  format-check:
    name: format-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format-22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update
          sudo apt-get install -y clang-format-22

      - name: Check formatting
        run: find src tests -name '*.cpp' -o -name '*.hpp' | xargs clang-format-22 --dry-run --Werror

  sanitizers:
    name: sanitizers
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libjsoncpp-dev uuid-dev

      - name: Configure with ASan/UBSan
        run: |
          cmake -S . -B build-asan -DBUILD_TESTING=ON \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build-asan -j$(nproc) --verbose

      - name: Test
        run: ctest --test-dir build-asan --output-on-failure
